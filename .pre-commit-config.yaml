repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: '^\.(claude_settings|auto-claude-status|auto-claude-security)\.json$|^\.auto-claude/'
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        entry: pip-audit --exit-zero
        language: system
        pass_filenames: false
        types: [python]
        stages: [commit]

  - repo: local
    hooks:
      - id: grype
        name: grype
        entry: sh -c "which grype && grype . --fail-on medium || echo 'grype not installed, skipping (runs in CI)'"
        language: system
        pass_filenames: false
        types: [python]
        stages: [manual]
